<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="330" viewBox="0 0 1280 330" role="img" aria-label="lastmemory">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a0b"/>
      <stop offset="1" stop-color="#0d0f14"/>
    </linearGradient>
    <radialGradient id="vignette" cx="28%" cy="45%" r="55%">
      <stop offset="0" stop-color="#0a0a0b" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#0a0a0b" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>

  <rect width="1280" height="330" fill="url(#bg)"/>

  <!-- faint network line art, monochrome, low opacity -->
  <g stroke="#2c323d" stroke-width="1.1" opacity="0.55">
    <line x1="600" y1="90"  x2="690" y2="150"/>
    <line x1="690" y1="150" x2="660" y2="250"/>
    <line x1="690" y1="150" x2="770" y2="95"/>
    <line x1="770" y1="95"  x2="800" y2="200"/>
    <line x1="660" y1="250" x2="800" y2="200"/>
    <line x1="800" y1="200" x2="880" y2="270"/>
    <line x1="770" y1="95"  x2="900" y2="120"/>
    <line x1="900" y1="120" x2="980" y2="190"/>
    <line x1="900" y1="120" x2="1000" y2="70"/>
    <line x1="980" y1="190" x2="1090" y2="140"/>
    <line x1="980" y1="190" x2="1080" y2="250"/>
    <line x1="880" y1="270" x2="1080" y2="250"/>
    <line x1="1090" y1="140" x2="1170" y2="90"/>
    <line x1="1090" y1="140" x2="1180" y2="210"/>
    <line x1="1180" y1="210" x2="1240" y2="150"/>
    <line x1="1170" y1="90"  x2="1240" y2="150"/>
    <line x1="1000" y1="70"  x2="1170" y2="90"/>
    <line x1="1080" y1="250" x2="1180" y2="210"/>
  </g>
  <g fill="#3a414f" opacity="0.85">
    <circle cx="600" cy="90"   r="3.5"/>
    <circle cx="690" cy="150"  r="4.5"/>
    <circle cx="660" cy="250"  r="3"/>
    <circle cx="770" cy="95"   r="4"/>
    <circle cx="800" cy="200"  r="4.5"/>
    <circle cx="880" cy="270"  r="3"/>
    <circle cx="900" cy="120"  r="4"/>
    <circle cx="1000" cy="70"  r="3.5"/>
    <circle cx="1090" cy="140" r="4"/>
    <circle cx="1080" cy="250" r="3.5"/>
    <circle cx="1170" cy="90"  r="3"/>
    <circle cx="1180" cy="210" r="4"/>
    <circle cx="1240" cy="150" r="3"/>
  </g>
  <!-- the single accent node -->
  <circle cx="980" cy="190" r="9" fill="#6ea8fe" filter="url(#glow)"/>
  <circle cx="980" cy="190" r="6" fill="#6ea8fe"/>

  <!-- keep the left side clean so the wordmark reads -->
  <rect width="1280" height="330" fill="url(#vignette)"/>

  <!-- wordmark -->
  <text x="80" y="160" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="74" font-weight="700" fill="#f4f6fb" letter-spacing="-1">lastmemory</text>
  <rect x="84" y="184" width="66" height="3" rx="1.5" fill="#6ea8fe"/>
  <text x="84" y="222" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="23" font-weight="400" fill="#8b93a2">Persistent, token efficient memory for coding agents</text>
  <text x="84" y="262" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="14" fill="#5b616e">a neural network of markdown files, anchored to your repo, that forgets what stops mattering</text>
</svg>
